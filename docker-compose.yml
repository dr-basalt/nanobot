x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/root/.nanobot

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config

    # IMPORTANT: override ENTRYPOINT (sinon Docker prefixe par "nanobot")
    entrypoint: ["/bin/sh", "-lc"]

    # maintenant command est passé au shell, pas à nanobot
    command: ["./coolify-entrypoint.sh"]

    restart: unless-stopped
    ports:
      - 18790:18790

  nanobot-cli:
    <<: *common-config
    profiles: ["cli"]
    command: ["status"]
    stdin_open: true
    tty: true
